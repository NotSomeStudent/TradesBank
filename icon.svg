<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Equity Banking">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0E1A24"/>
      <stop offset="1" stop-color="#0A1219"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#1E8E6A"/>
      <stop offset="1" stop-color="#3FD7A0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <g transform="translate(140 132)">
    <!-- ascending equity bars forming an E -->
    <rect x="0"   y="160" width="44" height="88"  rx="10" fill="url(#bar)"/>
    <rect x="62"  y="104" width="44" height="144" rx="10" fill="url(#bar)" opacity="0.92"/>
    <rect x="124" y="40"  width="44" height="208" rx="10" fill="url(#bar)" opacity="0.84"/>
    <rect x="186" y="0"   width="44" height="248" rx="10" fill="#E9F1ED" opacity="0.95"/>
  </g>
</svg>
