<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="color-scheme" content="dark" />
  <title>Equity Banking</title>

  <!-- PWA -->
  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="theme-color" content="#0A1219" />
  <link rel="icon" type="image/svg+xml" href="./icon.svg" />

  <!-- iOS standalone -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Equity" />
  <link rel="apple-touch-icon" href="./icon.svg" />

  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <!-- ============ LOGIN / WELCOME ============ -->
  <section id="auth" class="auth" aria-label="Sign in">
    <div class="auth-aurora" aria-hidden="true"></div>
    <div class="auth-inner">
      <div class="brand brand--lg">
        <span class="brand-mark" aria-hidden="true">
          <i></i><i></i><i></i><i></i>
        </span>
        <span class="brand-name">Equity<span class="brand-thin">Banking</span></span>
      </div>

      <p class="auth-tag">Private banking &amp; markets, reimagined.</p>

      <form id="loginForm" class="auth-form" autocomplete="off" novalidate>
        <label class="field">
          <span class="field-label">Username</span>
          <input id="username" name="username" type="text" inputmode="text"
                 placeholder="zachary.nichols" autocomplete="off" spellcheck="false" />
        </label>
        <label class="field">
          <span class="field-label">Password</span>
          <input id="password" name="password" type="password"
                 placeholder="••••••••••" autocomplete="off" />
          <span class="field-hint">Demo only — any value works and nothing is stored.</span>
        </label>
        <button type="submit" class="btn btn--primary btn--block" id="loginBtn">
          <span>Continue</span>
        </button>
      </form>

      <div class="auth-foot">
        <span class="dot-live"></span>
        Fictional demo environment — no real accounts, money, or data.
      </div>
    </div>
  </section>

  <!-- ============ APP SHELL ============ -->
  <div id="app" class="app" hidden>
    <header class="topbar" role="banner">
      <div class="brand brand--sm">
        <span class="brand-mark" aria-hidden="true"><i></i><i></i><i></i><i></i></span>
        <span class="brand-name">Equity<span class="brand-thin">Banking</span></span>
      </div>
      <div class="topbar-right">
        <span class="updated" id="lastUpdated" title="Market data last refreshed">—</span>
        <button class="icon-btn" id="logoutBtn" aria-label="Sign out" title="Sign out">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="m16 17 5-5-5-5"/><path d="M21 12H9"/></svg>
        </button>
      </div>
    </header>

    <main id="view" class="view" tabindex="-1"><!-- screens render here --></main>

    <nav class="tabbar" role="navigation" aria-label="Primary">
      <button class="tab" data-route="home" aria-label="Home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>
        <span>Home</span>
      </button>
      <button class="tab" data-route="accounts" aria-label="Accounts">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10h18"/><path d="M7 15h4"/></svg>
        <span>Accounts</span>
      </button>
      <button class="tab" data-route="portfolio" aria-label="Markets">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m7 14 4-4 3 3 5-6"/></svg>
        <span>Markets</span>
      </button>
      <button class="tab" data-route="cards" aria-label="Cards">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2.5"/><path d="M2 10h20"/></svg>
        <span>Cards</span>
      </button>
      <button class="tab" data-route="insights" aria-label="Insights">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><rect x="7" y="11" width="3" height="6"/><rect x="13" y="7" width="3" height="10"/></svg>
        <span>Insights</span>
      </button>
    </nav>
  </div>

  <!-- ============ MODAL + TOAST HOSTS ============ -->
  <div id="modalHost" class="modal-host" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-head">
        <h2 id="modalTitle" class="modal-title">—</h2>
        <button class="icon-btn" data-close aria-label="Close">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>

  <div id="toastHost" class="toast-host" aria-live="polite" aria-atomic="true"></div>

  <script src="./app.js"></script>
</body>
</html>
